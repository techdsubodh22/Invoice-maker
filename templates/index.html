<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Maker — Consultant Invoice Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ====== TOP NAVBAR ====== -->
<header class="topbar">
  <div class="topbar-left">
    <div class="brand-icon">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <span class="brand-name">InvoiceMaker</span>
    <span class="brand-sub">Software Consultant Edition</span>
  </div>

  <div class="topbar-center">
    <!-- Hamburger button to open template drawer -->
    <button class="btn-templates-toggle" id="templates-toggle-btn" onclick="toggleTemplateDrawer()" title="Choose Template">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      Templates
      <span class="current-template-badge" id="current-template-label">Classic</span>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" id="templates-chevron">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
  </div>

  <div class="topbar-right">
    <!-- GST Toggle -->
    <div class="topbar-gst-wrap">
      <label class="topbar-toggle-label">
        <span class="toggle-switch">
          <input type="checkbox" id="gst-toggle" onchange="handleGSTToggle()">
          <span class="toggle-slider"></span>
        </span>
        GST Mode
      </label>
      <div id="gst-type-wrap" style="display:none;">
        <select id="gst-type" onchange="schedulePreview()" class="topbar-select">
          <option value="cgst_sgst">CGST + SGST (9%+9%)</option>
          <option value="igst">IGST (18%)</option>
        </select>
      </div>
    </div>

    <!-- Export Buttons -->
    <button class="btn-export btn-export-pdf" onclick="exportInvoice('pdf')">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
      PDF
    </button>
    <button class="btn-export btn-export-docx" onclick="exportInvoice('docx')">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
      DOCX
    </button>
  </div>
</header>

<!-- ====== TEMPLATE DRAWER (dropdown) ====== -->
<div class="template-drawer" id="template-drawer">
  <div class="template-drawer-inner">
    <div class="template-card active" data-template="classic" onclick="selectTemplate('classic', this)">
      <div class="template-thumb template-thumb-classic">
        <div class="t-header"></div>
        <div class="t-line"></div><div class="t-line short"></div>
        <div class="t-line"></div><div class="t-line accent"></div>
        <div class="t-line short"></div>
      </div>
      <div class="template-label">Classic</div>
    </div>
    <div class="template-card" data-template="modern" onclick="selectTemplate('modern', this)">
      <div class="template-thumb template-thumb-modern">
        <div class="t-header"></div>
        <div class="t-line"></div><div class="t-line short"></div>
        <div class="t-line"></div><div class="t-line accent"></div>
        <div class="t-line short"></div>
      </div>
      <div class="template-label">Modern Blue</div>
    </div>
    <div class="template-card" data-template="minimal" onclick="selectTemplate('minimal', this)">
      <div class="template-thumb template-thumb-minimal">
        <div class="t-header"></div>
        <div class="t-line"></div><div class="t-line short"></div>
        <div class="t-line"></div><div class="t-line accent"></div>
        <div class="t-line short"></div>
      </div>
      <div class="template-label">Minimal</div>
    </div>
    <div class="template-card" data-template="corporate" onclick="selectTemplate('corporate', this)">
      <div class="template-thumb template-thumb-corporate">
        <div class="t-header"></div>
        <div class="t-line"></div><div class="t-line short"></div>
        <div class="t-line"></div><div class="t-line accent"></div>
        <div class="t-line short"></div>
      </div>
      <div class="template-label">Corporate</div>
    </div>
  </div>
</div>
<div class="template-drawer-backdrop" id="template-backdrop" onclick="closeTemplateDrawer()"></div>

<!-- ====== MAIN SPLIT LAYOUT ====== -->
<div class="app-body">

  <!-- LEFT: Form Panel -->
  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <h2>Invoice Details</h2>
      <p>Fill in the fields — preview updates live on the right</p>
    </div>

    <div class="form-body">

      <!-- Invoice Info -->
      <div class="form-section">
        <div class="form-section-title">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Invoice Info
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Invoice Number</label>
            <input type="text" id="invoice_number" value="{{ next_invoice_number }}" oninput="schedulePreview()">
          </div>
          <div class="form-group gst-only" id="place_of_supply_wrap">
            <label>Place of Supply</label>
            <input type="text" id="place_of_supply" placeholder="e.g. Maharashtra" oninput="schedulePreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Invoice Date</label>
            <input type="date" id="invoice_date" value="{{ today }}" oninput="schedulePreview()">
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="due_date" oninput="schedulePreview()">
          </div>
        </div>
      </div>

      <!-- Consultant (From) -->
      <div class="form-section">
        <div class="form-section-title">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Your Details
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="consultant_name" placeholder="Your name" oninput="schedulePreview()">
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="consultant_address" placeholder="Street, City, State, PIN" rows="3" oninput="schedulePreview()"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="consultant_phone" placeholder="+91 98765 43210" oninput="schedulePreview()">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="consultant_email" placeholder="you@example.com" oninput="schedulePreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>PAN Number</label>
            <input type="text" id="consultant_pan" placeholder="ABCDE1234F" oninput="schedulePreview()">
          </div>
          <div class="form-group gst-only" id="consultant_gstin_wrap">
            <label>GSTIN</label>
            <input type="text" id="consultant_gstin" placeholder="22ABCDE1234F1Z5" oninput="schedulePreview()">
          </div>
        </div>
      </div>

      <!-- Client (To) -->
      <div class="form-section">
        <div class="form-section-title">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          Client Details
        </div>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="client_company" placeholder="Client Company Pvt Ltd" oninput="schedulePreview()">
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="client_address" placeholder="Street, City, State, PIN" rows="3" oninput="schedulePreview()"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Contact Person</label>
            <input type="text" id="client_contact" placeholder="Name" oninput="schedulePreview()">
          </div>
          <div class="form-group gst-only" id="client_gstin_wrap">
            <label>Client GSTIN</label>
            <input type="text" id="client_gstin" placeholder="22XXXXX1234X1Z5" oninput="schedulePreview()">
          </div>
        </div>
      </div>

      <!-- Line Items -->
      <div class="form-section">
        <div class="form-section-title">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          Service Line Items
        </div>
        <div id="line-items-container"></div>
        <button class="btn-add-item" onclick="addLineItem()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Add Line Item
        </button>
      </div>

      <!-- Bank Details (optional toggle) -->
      <div class="form-section optional-section" id="bank-section">
        <div class="form-section-title optional-title" onclick="toggleSection('bank')">
          <div style="display:flex;align-items:center;gap:6px;">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
            </svg>
            Bank Details
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
            <span class="optional-badge" id="bank-badge">Off</span>
            <label class="toggle-switch small-toggle" onclick="event.stopPropagation()">
              <input type="checkbox" id="bank-toggle" onchange="handleSectionToggle('bank'); schedulePreview()">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="optional-body" id="bank-body" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label>Bank Name</label>
              <input type="text" id="bank_name" placeholder="HDFC Bank" oninput="schedulePreview()">
            </div>
            <div class="form-group">
              <label>Account Type</label>
              <select id="account_type" onchange="schedulePreview()">
                <option value="Savings">Savings</option>
                <option value="Current">Current</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Account Number</label>
              <input type="text" id="account_number" placeholder="0123456789" oninput="schedulePreview()">
            </div>
            <div class="form-group">
              <label>IFSC Code</label>
              <input type="text" id="ifsc_code" placeholder="HDFC0001234" oninput="schedulePreview()">
            </div>
          </div>
        </div>
      </div>

      <!-- Notes (optional toggle) -->
      <div class="form-section optional-section" id="notes-section">
        <div class="form-section-title optional-title" onclick="toggleSection('notes')">
          <div style="display:flex;align-items:center;gap:6px;">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Notes &amp; Terms
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
            <span class="optional-badge" id="notes-badge">Off</span>
            <label class="toggle-switch small-toggle" onclick="event.stopPropagation()">
              <input type="checkbox" id="notes-toggle" onchange="handleSectionToggle('notes'); schedulePreview()">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="optional-body" id="notes-body" style="display:none;">
          <div class="form-group">
            <label>Payment Terms / Notes</label>
            <textarea id="notes" placeholder="Payment due within 30 days of invoice date.&#10;Bank transfer only." rows="4" oninput="schedulePreview()"></textarea>
          </div>
        </div>
      </div>

      <!-- Draft Mail (optional toggle) -->
      <div class="form-section optional-section" id="draft-mail-section">
        <div class="form-section-title optional-title" onclick="toggleSection('draft-mail')">
          <div style="display:flex;align-items:center;gap:6px;">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            Draft Mail
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
            <span class="optional-badge" id="draft-mail-badge">Off</span>
            <label class="toggle-switch small-toggle" onclick="event.stopPropagation()">
              <input type="checkbox" id="draft-mail-toggle" onchange="handleSectionToggle('draft-mail'); schedulePreview()">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="optional-body" id="draft-mail-body" style="display:none;">
          <div class="form-group">
            <label>Mail Subject</label>
            <input type="text" id="draft_mail_subject" placeholder="Invoice #001 — Consulting Services for June 2026" oninput="schedulePreview()">
          </div>
          <div class="form-group">
            <label>Mail Body</label>
            <textarea id="draft_mail_body" placeholder="Dear [Client Name],&#10;&#10;Please find attached Invoice #001 for consulting services rendered during June 2026.&#10;&#10;Amount Due: ₹XX,XXX&#10;Due Date: DD MMM YYYY&#10;&#10;Kindly process the payment at your earliest convenience.&#10;&#10;Regards,&#10;[Your Name]" rows="10" oninput="schedulePreview()"></textarea>
          </div>
        </div>
      </div>

    </div><!-- /form-body -->
  </div><!-- /form-panel -->

  <!-- RIGHT: Preview Panel -->
  <div class="preview-panel">
    <div class="preview-toolbar">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#64748b" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      <span>Live Preview</span>
      <div class="preview-badge live">Live</div>
      <div style="margin-left:auto; font-size:11px; color:#94a3b8;" id="preview-status">Ready</div>
    </div>

    <div class="preview-frame-wrap">
      <iframe id="preview-iframe" src="about:blank"></iframe>
    </div>

    <div class="preview-loading" id="preview-loading">
      <div class="spinner"></div>
    </div>
  </div>

</div><!-- /app-body -->

<datalist id="expense-suggestions">
  <option value="Airfare — Domestic">
  <option value="Airfare — International">
  <option value="Hotel &amp; Accommodation">
  <option value="Visa &amp; Travel Documentation">
  <option value="Airport Transfers &amp; Local Transport">
  <option value="Meals &amp; Per Diem (Daily Allowance)">
  <option value="Foreign Exchange &amp; Transaction Charges">
  <option value="Telephone &amp; Communication Charges">
  <option value="Courier &amp; Documentation Charges">
  <option value="Cab / Taxi Charges">
</datalist>

<datalist id="service-suggestions">
  <option value="Software Architecture &amp; Design Consultation">
  <option value="Technical Consulting &amp; Advisory Services">
  <option value="Software Development Services">
  <option value="Code Review &amp; Quality Assurance">
  <option value="System Integration &amp; API Development">
  <option value="Performance Optimization &amp; Troubleshooting">
  <option value="Technical Documentation &amp; Specification">
  <option value="Project Management &amp; Delivery Oversight">
  <option value="Infrastructure &amp; DevOps Consulting">
  <option value="Research, Analysis &amp; Proof of Concept">
  <option value="Product Knowledge Transfer &amp; Training">
  <option value="Client Site Visit &amp; On-site Consultation">
</datalist>

<div id="toast"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
